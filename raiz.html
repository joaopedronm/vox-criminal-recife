<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vox Criminal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0d0d0d;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #f0c040;
            border: 1px solid rgba(240, 192, 64, 0.3);
            border-radius: 100px;
            padding: 6px 16px;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 700;
            line-height: 1.15;
        }

        h1 span { color: #f0c040; }

        .divider {
            width: 40px;
            height: 2px;
            background: #f0c040;
            margin: 2rem auto;
            border-radius: 2px;
        }

        p {
            font-size: 1rem;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="badge">Em breve</span>
        <h1><span>VOX</span> CRIMINAL</h1>
        <div class="divider"></div>
        <p>Site em desenvolvimento.</p>
    </div>
</body>
</html>
